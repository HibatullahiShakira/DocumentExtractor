services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=8000
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      - PORT=80
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
